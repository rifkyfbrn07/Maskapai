name: maskapai

services:
  load-balancer:
    image: nginx:1.28-alpine
    container_name: maskapai-load-balancer
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/load-balancer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy
      web3:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  web1: &laravel-web
    build:
      context: .
      dockerfile: Dockerfile
    image: maskapai-laravel:local
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-maskapai}
      DB_USERNAME: ${MYSQL_USER:-maskapai}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
    volumes:
      - laravel_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  web2:
    <<: *laravel-web

  web3:
    <<: *laravel-web

  mysql:
    image: mysql:8.4
    container_name: maskapai-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-maskapai}
      MYSQL_USER: ${MYSQL_USER:-maskapai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  mysql_data:
  laravel_storage:
